<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkCortexa AI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:360px;min-height:480px;background:#060910;color:#e2eaf8;font-family:'Syne',sans-serif;overflow:hidden}
.header{background:#0d1320;border-bottom:1px solid rgba(0,200,255,0.15);padding:16px 18px;display:flex;align-items:center;gap:12}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00c8ff,#0055ff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#060910;flex-shrink:0}
.title{font-weight:800;font-size:15px;color:#e2eaf8}
.subtitle{font-size:10px;color:#00c8ff;font-family:'Space Mono',monospace;letter-spacing:1px}
.status-section{padding:20px 18px;text-align:center;border-bottom:1px solid rgba(255,255,255,0.05)}
.risk-circle{position:relative;display:inline-block;margin-bottom:12px}
.score-text{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:900;line-height:1}
.score-sub{position:absolute;top:60%;left:50%;transform:translate(-50%,8px);font-size:10px;font-family:'Space Mono',monospace;color:rgba(226,234,248,0.5)}
.status-badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:1px;text-transform:uppercase}
.safe{background:rgba(0,255,136,0.1);color:#00ff88;border:1px solid rgba(0,255,136,0.3)}
.suspicious{background:rgba(255,170,0,0.1);color:#ffaa00;border:1px solid rgba(255,170,0,0.3)}
.phishing{background:rgba(255,51,102,0.1);color:#ff3366;border:1px solid rgba(255,51,102,0.3)}
.unknown{background:rgba(255,255,255,0.05);color:rgba(226,234,248,0.5);border:1px solid rgba(255,255,255,0.1)}
.info-section{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.05)}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;font-size:12px}
.info-key{color:rgba(226,234,248,0.45);font-family:'Space Mono',monospace;font-size:11px}
.info-val{color:#e2eaf8;font-family:'Space Mono',monospace;font-size:11px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right}
.api-section{padding:12px 18px;border-bottom:1px solid rgba(255,255,255,0.05)}
.section-title{font-size:10px;color:rgba(226,234,248,0.4);font-family:'Space Mono',monospace;letter-spacing:1px;margin-bottom:10px}
.api-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0}
.api-name{font-size:12px;color:rgba(226,234,248,0.7)}
.api-dot{width:8px;height:8px;border-radius:50%}
.actions{padding:14px 18px;display:flex;gap:10px}
.btn{flex:1;padding:10px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Syne',sans-serif;border:none;transition:all 0.2s}
.btn-primary{background:linear-gradient(135deg,#00c8ff,#0055ff);color:#060910}
.btn-secondary{background:transparent;border:1px solid rgba(0,200,255,0.2);color:rgba(226,234,248,0.6)}
.blockchain{padding:10px 18px;display:flex;align-items:center;gap:8;font-size:10px;font-family:'Space Mono',monospace;color:rgba(168,85,247,0.7);background:rgba(168,85,247,0.05);border-top:1px solid rgba(168,85,247,0.1)}
.scanning{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16}
.scan-icon{font-size:48px;animation:spin 2s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.scan-text{font-family:'Space Mono',monospace;font-size:13px;color:#00c8ff}
.scan-steps{font-size:11px;color:rgba(226,234,248,0.4);font-family:'Space Mono',monospace;text-align:center;line-height:2}
</style>
</head>
<body>
<div class="header">
  <div class="logo">LC</div>
  <div>
    <div class="title">LinkCortexa AI</div>
    <div class="subtitle">CYBER THREAT DETECTOR</div>
  </div>
</div>
<div id="content">
  <div class="scanning">
    <div class="scan-icon">⬡</div>
    <div class="scan-text">SCANNING CURRENT PAGE...</div>
    <div class="scan-steps">Checking VirusTotal<br/>Querying AbuseIPDB<br/>Running ML Analysis<br/>Verifying Blockchain</div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
